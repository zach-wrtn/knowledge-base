id: edge_case-002
title: "Concurrent KB writes from parallel agents cause non-fast-forward rejection"
category: edge_case
severity: minor
source_sprint: kb-phase1-dogfood
source_group: group-002
discovered_at: "2026-04-19T04:40:00+09:00"
frequency: 1
last_seen: kb-phase1-dogfood
description: |
  두 세션/워커가 KB에 동시에 쓰기를 시도하면, 후행 push가 non-fast-forward로 거부된다.
  이는 기대되는 동작이며, 스킬의 rebase-retry 루프가 해결한다.
detection: |
  - 첫 push에서 `Updates were rejected because the tip of your current branch is behind` 에러.
  - `git pull --rebase` 후 재push.
prevention: |
  - zzem-kb:* 쓰기 스킬은 `for i in 1 2 3; do pull --rebase && push; done` 루프를 내장.
  - 여전히 실패 시 최대 3회 재시도 후 사용자에게 보고.
contract_clause: |
  동일 KB에 대한 concurrent write는 rebase-retry 루프로 처리한다.
  3회 재시도 후에도 실패 시 사용자 개입 요청.
schema_version: 1
