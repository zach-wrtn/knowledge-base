id: correctness-004
title: Cursor 페이지네이션 repository 쿼리가 $lt 사용 (CursorResponseDto 규약은 $lte)
category: correctness
severity: major
source_sprint: ugc-platform-001
source_group: group-001
discovered_at: '2026-04-22T17:30:00+09:00'
frequency: 2
last_seen: ugc-platform-003
description: |
  이 코드베이스의 CursorResponseDto 규약은 `list[limit]` 의 extra 아이템 id 를
  다음 페이지 cursor 로 인코딩한다 (fetch limit+1 개 → list 잘라내기 → 마지막
  +1 번째 항목을 nextCursor 로). Repository 레이어가 `_id: { $lt: cursor }`
  를 사용하면 다음 페이지에서 extra 아이템이 조회되지 않아 page 2 마지막
  항목이 누락된다. 올바른 규약은 `_id: { $lte: cursor }` (extra 아이템이
  page+1 의 첫 항목이 되도록).
detection: |
  - `rg '_id:\s*\{\s*\$lt\s*:' src/persistence/**/*.repository.ts` → 0 hit 확인
  - 동일 codebase 의 선례 쿼리와 비교 (예: filter.repository.ts:35,69 는 $lte)
  - E2E 에서 limit=2 + seed 3 개 → page 2 list.length 를 1 로 assert (0 이면 $lt 의심)
prevention: |
  - Repository cursor 쿼리는 `$lte` 고정. 새로운 cursor method 추가 시 기존
    선례를 먼저 읽어 동일 연산자 사용
  - Code review 체크리스트: "cursor 쿼리 연산자 $lt → $lte 확인"
  - Contract V-method grep 에 `rg '_id:\s*\{\s*\$lt\s*:' repository/` → 0 hit 의무
contract_clause: |
  페이지네이션 repository 의 cursor 쿼리는 반드시 `_id: { $lte: cursorId }` 를
  사용한다. CursorResponseDto 규약 (extra 아이템 id 를 cursor 로 인코딩) 과의
  정합을 유지하기 위함. `$lt` 사용 시 page+1 마지막 아이템 누락.
example:
  bad: |
    // content.repository.ts
    if (cursor) {
      filter._id = { $lt: new Types.ObjectId(cursor) };  // ← 규약 위반
    }
    const docs = await this.repository.findAll(filter, undefined, {
      limit,
      sort: { _id: -1 },
    });
    // 결과: page 2 에서 마지막 항목 1개 누락
  good: |
    // content.repository.ts
    if (cursor) {
      // Convention: cursor = extra item id from CursorResponseDto.
      // Use $lte so the extra item becomes the first of the next page.
      filter._id = { $lte: new Types.ObjectId(cursor) };
    }
    const docs = await this.repository.findAll(filter, undefined, {
      limit,
      sort: { _id: -1 },
    });
schema_version: 1
