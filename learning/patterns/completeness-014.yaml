id: completeness-014
title: Cross-tab parity — 새 cross-cutting enrichment 도입 시 도메인의 모든 list/single endpoint 에 적용
category: completeness
severity: major
source_sprint: free-filter-qa-fix
source_group: group-5
discovered_at: '2026-04-27T22:48:52+09:00'
frequency: 1
last_seen: free-filter-qa-fix
description: |
  같은 도메인 (예: filter) 의 응답을 만드는 endpoint 가 다양 (일반 탭 list, 무료 탭
  list, 단건 조회, 추천 탭 list, admin) 이고 enrichment 가 분산 helper 로 구현되어
  있을 때, 새 cross-cutting enrichment (rosterContext / freeUsedToday / isFreeFilter
  같은 정보) 를 도입하면 일부 endpoint 의 helper 만 수정하고 다른 helper 는 누락하는
  경우가 흔함. 사용자가 "한 탭에선 무료, 다른 탭에선 유료" 같은 cross-tab 불일치를
  보면 root cause 추적이 어려움 — 각 endpoint 의 enrichment 호출처를 일일이 비교해야.
  completeness-010 (entity/DTO 확장 path 전수 나열) 의 cross-cutting enrichment 변형.

  실제 사례 (free-filter-qa-fix Group 5 — IS-1423):
  - free-tab-diversification 이 enrichFilters / readFreeTab / readOne 에 rosterContext
    적용
  - readGridFeedRecommendations / enrichRecommendedFilters 만 누락 → 추천 탭에서 무료
    슬롯 필터가 isFreeFilter:false 하드코딩
  - 사용자: 무료 탭에서 무료 표시되던 필터가 추천 탭에선 유료
detection: |
  - grep: 같은 도메인의 enrichment helper 가 여러 개 (예: enrichFilters,
    enrichRecommendedFilters) 인지 확인
  - 같은 cross-cutting field (isFreeFilter, hasGeneratedToday) 가 모든 helper 에서
    동일 source (rosterContext) 를 참조하는지 grep
  - "isFreeFilter: false" / "isFreeFilter: true" 같은 boolean 하드코딩 검색 — context
    도입 후 잔존하면 의심 후보
  - Cross-tab QA: 같은 entity 의 응답을 모든 진입 path 에서 비교 (list endpoint 별
    curl + diff)
prevention: |
  - 단일 enrichment helper 패턴 권장: 도메인별로 1개의 enrich function 을 두고 모든
    endpoint 가 호출. 다른 enrichment 가 필요하면 그 helper 의 옵션으로 처리.
  - 분리해야 한다면 (성능 등 이유) Contract 의 Cross-task Integration 섹션에 모든
    enrichment helper 를 enumerate + 새 cross-cutting field 도입 시 모든 helper 에
    적용 의무 명시.
  - lint rule: 같은 cross-cutting field 가 도메인 내 어느 helper 에서 하드코딩된 값으로
    response build 에 들어가면 경고
contract_clause: |
  Cross-cutting enrichment (rosterContext / freeUsedToday / isFreeFilter 등) 도입 시
  Contract Scope 섹션에 도메인의 모든 list/single endpoint enumerate + 각 endpoint
  의 enrichment 호출처가 새 source 를 참조하는지 확인. 분산 enrichment helper 가
  있으면 모두 동시 수정 의무. Evaluator Round 1 review 에서 "enrichment 가 도메인
  내 모든 helper 에 일관 적용" 명시 검증.
example:
  bad: |
    // ❌ 일부 helper 만 적용
    function enrichFilters(filters, ctx, { rosterContext }) {
      return filters.map(f => ({ ...f, isFreeFilter: !!rosterContext?.todayActiveSlots.get(f.id) }));
    }
    function enrichRecommendedFilters(filters, ctx) {
      return filters.map(f => ({ ...f, isFreeFilter: false }));  // ← 누락 — 같은 도메인의 다른 helper
    }
  good: |
    // ✓ 모든 helper 가 같은 source
    function enrichRecommendedFilters(filters, ctx, { rosterContext }) {
      return filters.map(f => ({
        ...f,
        isFreeFilter: !!rosterContext?.todayActiveSlots.get(f.id),  // ← 동일 source
      }));
    }
schema_version: 1
