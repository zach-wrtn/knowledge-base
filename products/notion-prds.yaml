- id: 32f0159c-6b59-8066-88f1-cc0b723ae017
  title: 무료 필터 탐색 + 알림 전환 UX 를 통한 리텐션 개선 실험
  url: "https://www.notion.so/32f0159c6b59806688f1cc0b723ae017"
  created_time: "2026-03-26T02:13:00.000Z"
  last_edited_time: "2026-03-27T03:58:00.000Z"
  domain: ZZEM
  status: 예정
  description: |-
    현재 하루 한 건 무작위로 띄우는 무료 필터 경험을
    ’여러 개중 하나 고르기 / 앞으로의 며칠 무료 공개 예정을 보여주기 / 아기, 동물 적용 가능 필터 비중 높이기’
    를 통해 리텐션 개선을 AB 테스트로 검증한다.
  kpi_contribution: |-
    앞으로 나올 무료 필터를 미리 보여줌 → "오늘은 뭐나왔을까?" 기대감 형성 → 탐색 대상이 무료만 → 유료+무료로 확장 → 무료 필터 탭 방문·탐색량 ↑ → 재방문 주기 단축 → w1/w2 리텐션 ↑
    무료 탭에서 관심 필터 발견 → "공개되면 알려주세요" 알림 등록 → 공개일에 푸시 → 알림 기반 재방문 ↑ → 이탈 유저 복귀 → w1/w2 리텐션 ↑
