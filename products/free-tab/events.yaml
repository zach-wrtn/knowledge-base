      viewDwellMs: "number — DROP"
      sessionId: "string — DROP"
    notes: "[deprecated] 2026-04-21 | replaces: imp_vertical_feed_filter(feed_mode=free) | remove after: 즉시"

  - name: free_swipe_dwell
    trigger: "[DEPRECATED] SwipeFeed 체류시간 (호출처 없음)"
