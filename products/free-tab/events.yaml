      filtersViewedCount: "number — DROP"
      filtersUniqueCount: "number — DROP"
      didTapCta: "boolean — DROP"
      sessionId: "string — DROP"
    notes: "[deprecated] 2026-04-21 | replaces: screen_visit_duration | remove after: 즉시"

  - name: free_cta_tap
    trigger: "[DEPRECATED] CTA 탭 (click_ prefix 위반, imp_id 없음)"
    properties:
      filterId: "string — → filter_id"
      filterTitle: "string — → filter_title"
      isFree: "boolean — → is_free"
      viewsBeforeCta: "number — DROP (session 분석 이관)"
      sessionId: "string — DROP"
    notes: "[deprecated] 2026-04-21 | replaces: click_free_swipefeed_cta_btn(imp_id 포함) | remove after: 2026-04-28 | impl_site: free-tab-events.ts:87 (active in swipe-feed-free-footer.tsx:422)"
